server.port=${PORT:${SERVER_PORT:8080}}

# Streaming AI replies (see AiController#assistantStream) can run longer than
# Spring MVC's 30s async default, especially on slower models.
spring.mvc.async.request-timeout=60000

spring.datasource.url=${JDBC_DATABASE_URL:${DB_URL:jdbc:h2:mem:classedge;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

jwt.secret=${JWT_SECRET:U3R1ZHlBY2UyMDI2U3VwZXJTZWNyZXRLZXlGb3JKV1RBdXRoVG9rZW4=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Email (verification + password reset). Disabled by default -> links are logged instead of sent.
# Set MAIL_ENABLED=true and provide real SMTP credentials to actually deliver mail.
app.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google OAuth2 login. Leave GOOGLE_CLIENT_ID unset to keep the feature fully disabled
# (see config/OAuth2ClientConfig.java) — the app starts and runs normally either way.
# Create credentials at https://console.cloud.google.com/apis/credentials
google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}

ai.provider=${AI_PROVIDER:auto}
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openai.model=${OPENAI_MODEL:gpt-4o-mini}
ai.gemini.api-key=${GEMINI_API_KEY:}
# gemini-1.5-flash was shut down by Google — gemini-flash-latest auto-points to
# whatever the current-generation Flash model is, so it won't silently 404 again
# the next time Google retires a version.
ai.gemini.model=${GEMINI_MODEL:gemini-flash-latest}
